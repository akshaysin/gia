services:

  # ── Ollama model server ──────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    volumes:
      - gia_ollama_models:/root/.ollama
    restart: unless-stopped

  # ── gia chat agent ───────────────────────────────────────────────────────────
  gia:
    image: akshaysin/gia:latest
    depends_on:
      - ollama
    volumes:
      - ./:/app:Z
    environment:
      OLLAMA_URL: http://ollama:11434
      GIA_PROFILE: compat
      # Override any config.py default here if needed:
      # GIA_PROFILE: balanced
      # EMBED_MODEL: nomic-embed-text
      # CHAT_MODEL: phi4-mini:3.8b
      # EMBED_DIM: "0"
      # TOP_K: "5"
      # SIMILARITY_THRESHOLD: "0.3"
      # HISTORY_TURNS: "8"
      # CODE_STYLE: monokai
    stdin_open: true
    tty: true

volumes:
  # Ollama model cache — survives container restarts and image upgrades
  gia_ollama_models:
